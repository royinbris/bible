<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#a31545" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>성경</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Force unregister any existing service workers safely (Prevent Infinite Reload Loop)
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          let hasUnregistered = false;
          let promises = [];
          for(let registration of registrations) {
            promises.push(
              registration.unregister().then(function(success) {
                if(success) hasUnregistered = true;
              })
            );
          }
          Promise.all(promises).then(function() {
            // Only reload if we actually unregistered something AND we haven't already reloaded in this session
            if(hasUnregistered && !sessionStorage.getItem('sw_unregistered_reload')) {
              sessionStorage.setItem('sw_unregistered_reload', 'true');
              window.location.reload();
            }
          });
        });
      }
    </script>
  </body>
</html>
